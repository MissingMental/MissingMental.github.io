<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Secure Explorer - Final Dashboard with Friends</title>
    <style>
        :root {
            var-bg-main: #ffffff;
            --bg-side: #f8f9fa;
            --bg-right: #fbfbfc;
            --border-color: #e5e7eb;
            --text-dark: #333333;
            --text-muted: #6b7280;
            --accent-blue: #0078d4;
            --folder-yellow: #fcd34d;
            --file-blue: #60a5fa;
            --left-nav-width: 260px;
            --right-pane-width: 320px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Pretendard', Tahoma, sans-serif; color: var(--text-dark); background: #ffffff; height: 100vh; display: flex; overflow: hidden; }

        /* 1. 왼쪽 사이드바 */
        .left-nav { width: var(--left-nav-width); background: var(--bg-side); border-right: 1px solid var(--border-color); padding: 20px 15px; overflow-y: auto; flex-shrink: 0; }
        .nav-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 6px; font-size: 15px; cursor: pointer; margin-bottom: 8px; user-select: none; transition: 0.2s; }
        .nav-item:hover { background-color: #e5e7eb; }
        .nav-item.active { background-color: #e5e5e5; font-weight: 600; }
        .icon { font-size: 18px; margin-right: 12px; }
        .nav-text { flex-grow: 1; }
        .toggle-arrow { font-size: 12px; color: var(--text-muted); margin-right: 8px; transition: 0.2s; width: 12px; text-align: center; }
        .toggle-arrow.open { transform: rotate(90deg); }
        .sub-nav-list { overflow: hidden; max-height: 500px; transition: max-height 0.3s ease-in-out; }
        .sub-nav-list.hidden { max-height: 0; }
        .sub-item { padding: 8px 12px 8px 46px; font-size: 14px; margin-bottom: 2px; color: #4b5563; }
        .sub-item:hover { background-color: transparent; font-weight: 600; color: #111827; }
        .section-title { font-size: 13px; color: var(--text-muted); margin: 25px 0 10px 12px; }

        /* 2. 메인 컨테이너 */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); background: #ffffff; }
        .address-bar { flex: 1; margin-right: 40px; display: flex; align-items: center; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; color: #4b5563; }
        .wallet-status { font-size: 14px; font-weight: 600; color: var(--accent-blue); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }
        .content-wrapper { flex: 1; display: flex; overflow: hidden; }

        /* 3. 중앙 탐색기 영역 */
        .center-pane { flex: 1; padding: 24px; overflow-y: auto; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 30px; }
        .btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; cursor: pointer; background: #ffffff; color: var(--text-dark); transition: 0.2s; }
        .btn:hover { background: #f3f4f6; }
        .btn-primary { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .btn-primary:hover { background: #006bc0; }
        .file-grid { display: flex; gap: 40px; flex-wrap: wrap; }
        .file-item { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 72px; cursor: pointer; }
        .icon-box { width: 72px; height: 72px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .file-item:hover .icon-box { transform: scale(1.05); }
        .icon-folder { background-color: var(--folder-yellow); }
        .icon-file { background-color: var(--file-blue); }
        .file-label { font-size: 13px; color: #4b5563; text-align: center; word-break: keep-all; }

        /* ==================== 4. 우측 공유 패널 (레이아웃 분할) ==================== */
        .right-pane { 
            width: var(--right-pane-width); background: var(--bg-right); border-left: 1px solid var(--border-color); 
            display: flex; flex-direction: column; flex-shrink: 0; 
        }
        
        .pane-title { font-size: 14px; font-weight: 600; color: #4b5563; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 4-1. 상단: 그룹 공유 영역 (스크롤 가능) */
        .groups-section { padding: 24px; flex: 1; overflow-y: auto; }
        .group-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .group-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .member-list { list-style: none; color: #6b7280; font-size: 13px; line-height: 1.8; margin-bottom: 16px; }
        .btn-action { width: 100%; padding: 10px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-share { background: var(--accent-blue); color: white; }
        .btn-share:hover { background: #006bc0; }
        
        /* 4-2. 하단: 연락처 (친구창) 영역 (바닥 고정) */
        .friends-section { 
            padding: 24px; 
            background: #ffffff; 
            border-top: 1px solid var(--border-color); 
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        
        .friend-list { display: flex; flex-direction: column; gap: 8px; }
        .friend-item { display: flex; align-items: center; padding: 10px; border-radius: 8px; transition: 0.2s; cursor: pointer; border: 1px solid transparent; }
        .friend-item:hover { background-color: var(--bg-side); border-color: var(--border-color); }
        
        /* 아바타 (메타마스크 프로필 느낌의 그라데이션) */
        .friend-avatar { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px;}
        .av-1 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
        .av-2 { background: linear-gradient(135deg, #34d399, #10b981); }
        .av-3 { background: linear-gradient(135deg, #f87171, #ef4444); }
        
        .friend-info { flex-grow: 1; display: flex; flex-direction: column; }
        .friend-name { font-size: 14px; font-weight: 600; color: var(--text-dark); display: flex; align-items: center; gap: 6px; }
        
        /* 게임같은 상태 표시 (초록/회색 닷) */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-online { background-color: #10b981; }
        .status-offline { background-color: #d1d5db; }
        
        /* 지갑 주소 표시 */
        .friend-wallet { font-size: 11px; color: #9ca3af; font-family: monospace; margin-top: 2px; }
        
        /* 1:1 퀵 공유 버튼 */
        .btn-quick-share { background: transparent; border: 1px solid var(--border-color); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-quick-share:hover { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        
    </style>
</head>
<body>

    <!-- [1] 왼쪽: 폴더 트리 사이드바 -->
    <aside class="left-nav">
        <div class="nav-item active" onclick="toggleSubFolders()">
            <span class="toggle-arrow open" id="docsArrow">›</span>
            <span class="icon">📁</span><span class="nav-text">내 문서</span>
        </div>
        <div id="myDocsSub" class="sub-nav-list">
            <div class="nav-item sub-item"><span class="icon">📁</span>26년_1학기_전공</div>
            <div class="nav-item sub-item" style="background-color: #f3f4f6; font-weight: 600; color: #111827;"><span class="icon">📁</span>졸업프로젝트_자료</div>
        </div>
        <div class="nav-item"><span class="toggle-arrow" style="opacity: 0;">›</span><span class="icon">🖼️</span><span class="nav-text">이미지 보관함</span></div>
        <div class="nav-item"><span class="toggle-arrow" style="opacity: 0;">›</span><span class="icon">📑</span><span class="nav-text">공유받은 파일</span></div>
    </aside>

    <!-- 메인 컨테이너 -->
    <div class="main-container">
        
        <!-- [2] 상단 헤더 -->
        <header>
            <div class="address-bar"><span style="margin-right:8px;">🏠</span> 내 보관함 > 프로젝트 > 졸업작품</div>
            <div class="wallet-status"><span class="dot"></span> 0x71C...C42 (Sepolia)</div>
        </header>

        <!-- 중앙 콘텐츠 래퍼 -->
        <div class="content-wrapper">
            
            <!-- [3] 중앙 탐색기 영역 -->
            <main class="center-pane">
                <div class="toolbar">
                    <button class="btn"><span style="color:#8b5cf6;">➕</span> 새 폴더</button>
                    <button class="btn btn-primary">📤 파일 업로드</button>
                </div>
                <div class="file-grid">
                    <div class="file-item"><div class="icon-box icon-folder"></div><span class="file-label">기술 스택</span></div>
                    <div class="file-item"><div class="icon-box icon-file"></div><span class="file-label">설계도.pdf</span></div>
                </div>
            </main>

            <!-- [4] 우측 패널 (상/하 분할) -->
            <aside class="right-pane">
                
                <!-- 4-1. 상단: 그룹 공유 영역 -->
                <div class="groups-section">
                    <div class="pane-title">공유 가능 그룹 <span style="font-size:12px; font-weight:normal; cursor:pointer;">+ 추가</span></div>
                    <div class="group-card">
                        <div class="group-title">🎓 졸업 프로젝트 팀</div>
                        <ul class="member-list">
                            <li>• 유준상 (나)</li>
                        </ul>
                        <button class="btn-action btn-share">이 그룹에 공유하기</button>
                    </div>
                </div>

                <!-- 4-2. 하단: 연락처 (개인 공유) 영역 -->
                <div class="friends-section">
                    <div class="pane-title" style="margin-bottom: 12px;">개인 연락처 <span style="color:var(--text-muted); font-weight:normal; font-size:12px;">3명</span></div>
                    
                    <div class="friend-list">
                        <!-- 연락처 1: 온라인 상태 -->
                        <div class="friend-item">
                            <div class="friend-avatar av-1">이</div>
                            <div class="friend-info">
                                <span class="friend-name">이종현 <span class="status-dot status-online" title="온라인"></span></span>
                                <span class="friend-wallet">0x1A2...3B4</span>
                            </div>
                            <button class="btn-quick-share" title="이 사람에게만 공유">📤</button>
                        </div>
                        
                        <!-- 연락처 2: 온라인 상태 -->
                        <div class="friend-item">
                            <div class="friend-avatar av-2">오</div>
                            <div class="friend-info">
                                <span class="friend-name">오휘성 <span class="status-dot status-online" title="온라인"></span></span>
                                <span class="friend-wallet">0x8C9...1D2</span>
                            </div>
                            <button class="btn-quick-share" title="이 사람에게만 공유">📤</button>
                        </div>

                        <!-- 연락처 3: 오프라인 상태 -->
                        <div class="friend-item">
                            <div class="friend-avatar av-3" style="opacity: 0.6;">김</div>
                            <div class="friend-info">
                                <span class="friend-name" style="color: #9ca3af;">김태현 <span class="status-dot status-offline" title="오프라인"></span></span>
                                <span class="friend-wallet">0x5F6...7E8</span>
                            </div>
                            <button class="btn-quick-share" title="이 사람에게만 공유">📤</button>
                        </div>
                    </div>
                </div>

            </aside>
        </div>
    </div>

    <!-- 스크립트 -->
    <script>
        function toggleSubFolders() {
            const subList = document.getElementById('myDocsSub');
            const arrow = document.getElementById('docsArrow');
            if (subList.classList.contains('hidden')) {
                subList.classList.remove('hidden');
                arrow.classList.add('open');
            } else {
                subList.classList.add('hidden');
                arrow.classList.remove('open');
            }
        }
    </script>
</body>
</html>
